baseURL: "https://pathogens.cl/"
title: "Portal de Patógenos Chile"
theme: "node-pathogens-portal-theme"

# page with date in future will be included in the build
# buildFuture: true

languages:
  es:
    languageName: Español
    languageCode: es
  en:
    languageName: English
    languageCode: en

params:
  title: "Portal de Patógenos Chile"
  description: "El Portal de Patógenos Chile provee información sobre datos, recursos, herramientas y servicios relacionados con la preparación ante pandemias."
  images:
    - /img/pathogens_logo.svg
  portal_logo: "/img/pathogens_logo.svg"
  node_logo: "/img/example_logo.png"
  node_url: "https://pathogens.cl/"
  node_country: "Chile"
  social_media:
    show_in_footer: true
    twitter_url: "https://x.com/"
    linkedin_url: "https://www.linkedin.com/"
    contact_email: "contacto@pathogens.cl"
  git_repository: "https://github.com/johanpina/node-pathogens-portal"
  publications:
    country: "Chile"
    query_list:
      covid-19: 'ABSTRACT:("sars-cov-2" OR "covid-19")'
      influenza: 'ABSTRACT:"influenza"'
      mpox: 'ABSTRACT:"mpox" OR ABSTRACT:"monkeypox"'
    category_display: "list"
  # Analytics: set umami_website_id after deploying Umami (see docs/analytics.md)
  umami_website_id: ""
  umami_src: ""

taxonomies:
  highlights_topic: highlights_topics
  dashboards_topic: dashboards_topics

permalinks:
  highlights_topics: "/highlights/topics/:slug/"
  dashboards_topics: "/dashboards/topics/:slug/"

markup:
  goldmark:
    renderer:
      unsafe: true

related:
  includeNewer: true
  indices:
    - name: tags
      weight: 100
      threshold: 80
      toLower: false
