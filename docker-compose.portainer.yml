version: '3.8'

# ─────────────────────────────────────────────────────────────────
# Este archivo es el stack para Portainer.
# La imagen de la app se obtiene del GitLab Container Registry
# (se construye automáticamente vía CI/CD en cada push a main).
# ─────────────────────────────────────────────────────────────────

services:
  app:
    image: registry.gitlab.com/johanpina/pathogenschile:latest
    container_name: patogens_app
    ports:
      - "3001:3000"          # Puerto externo 3001 → interno 3000
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_SITE_URL=${SITE_URL}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - patogens_net

  db:
    image: postgres:16-alpine
    container_name: patogens_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - patogens_net

volumes:
  pgdata:
    name: patogens_pgdata
  uploads:
    name: patogens_uploads

networks:
  patogens_net:
    name: patogens_net
